services:
  - type: web
    name: e-commerce
    runtime: docker
    plan: free
    dockerfile: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://e-commerce.render.com
        scope: build
      - key: LOG_CHANNEL
        value: stderr
      - key: PORT
        value: 8080
  - type: pserv
    name: e-commerce-db
    runtime: mysql
    plan: free
    versionId: 8
    databaseName: ecommerce
    user: ecommerce
